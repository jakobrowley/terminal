    <!--
      Sentry error telemetry for the Terminal worker process (Component L).
      Uses Sentry's `window.sentryOnLoad` pattern for async loading.

      Errors here (listener spawn failures, IPC issues, filesystem errors)
      are critical because they silently break the plugin without the user
      knowing.

      See: https://tiny-tapes.sentry.io/settings/projects/terminal/
    -->
    <script>
      window.sentryOnLoad = function () {
        Sentry.init({
          release: "terminal@0.0.1",
          environment: "production",
          sendDefaultPii: false,
          tracesSampleRate: 0,
          replaysSessionSampleRate: 0,
          replaysOnErrorSampleRate: 0,
          initialScope: {
            tags: {
              plugin: "terminal",
              process: "worker"
            }
          },
          beforeSend: function (event) {
            if (
              event.exception &&
              event.exception.values &&
              event.exception.values.every(function (v) {
                return !v.stacktrace || !v.stacktrace.frames || v.stacktrace.frames.length === 0;
              })
            ) {
              event.tags = event.tags || {};
              event.tags.no_stacktrace = true;
            }
            return event;
          }
        });
      };
    </script>

      // Normalize key event from the native listener
      function normalizeKeyEvent(event) {
        const normalized = {
          alt: event.alt,
          ctrl: event.ctrl,
          meta: event.meta,
          shift: event.shift,
          code: KEY_MAP[event.code] || ""
        };
        console.log("Normalized event:", event, "to:", normalized);
        return normalized;
      }
      
      // Compare two key events for equality
      function areKeyEventsEqual(event1, event2) {
        const isEqual = event1.code === event2.code &&
               event1.shift === event2.shift &&
               event1.ctrl === event2.ctrl &&
               event1.alt === event2.alt &&
               event1.meta === event2.meta;
        
        console.log("Comparing events:", event1, event2, "Equal:", isEqual);
        return isEqual;
      }
      
      // Start the native keyboard listener
      function startKeyboardListener() {
        try {
          const fs = window.cep_node.require('fs');
          
          if (!fs.existsSync(LISTENER_PATH)) {
            console.error(`Listener not found at ${LISTENER_PATH}`);
            return false;
          }
          
          console.log("Listener file exists, starting process...");
          
          const child_process = window.cep_node.require('child_process');
          
          try {
            listenerProcess = child_process.spawn(LISTENER_PATH, {
              detached: true,
              stdio: ['ignore', 'pipe', 'pipe']
            });
            
            console.log("Listener process started with PID:", listenerProcess.pid);
          } catch (e) {
            console.error("Failed to spawn listener process:", e);
            return false;
          }
          
          // Handle process exit
          listenerProcess.on('close', (code) => {
            console.log("Listener process closed with code:", code);
            listenerProcess = null;
          });
          
          // Handle stderr
          listenerProcess.stderr.on('data', (data) => {
            console.log("Listener stderr:", data.toString());
          });
          
          // Handle keyboard events from the listener
          listenerProcess.stdout.on('data', (data) => {
            try {
              const dataString = data.toString().trim();
              
              if (!dataString) return;
              
              console.log("Received from listener:", dataString);
              
              const keyEvent = JSON.parse(dataString);
              const normalizedEvent = normalizeKeyEvent(keyEvent);
              
              // Check if this matches our target shortcut
              if (areKeyEventsEqual(normalizedEvent, TARGET_SHORTCUT)) {
                console.log("Target shortcut detected! Opening panel...");
                var param = { foo: "bar", value: 123 };
                csInterface.requestOpenExtension("com.example.terminal.panel", JSON.stringify(param));
              }
            } catch (e) {
              console.error("Error parsing listener output:", e);
            }
          });
          
          console.log("Listener setup complete.");
          return true;
        } catch (e) {
          console.error("Error starting keyboard listener:", e);
          return false;
        }
      }
      
      // Clean up when extension is unloaded
      function stopKeyboardListener() {
        if (listenerProcess) {
          console.log("Stopping listener process...");
          listenerProcess.kill();
          listenerProcess = null;
        }
      }
      
      // Initialize
      window.onload = function() {
        console.log("Window loaded, starting keyboard listener...");
        const SETTINGS_FILE_NAME = "terminal_settings.json";
        // --- Load initial settings from file --- START ---
        try {
          // Determine settings file path
          const userDataPath = csInterface.getSystemPath(SystemPath.USER_DATA);
          if (userDataPath) {
              settingsFilePath = path.join(userDataPath, SETTINGS_FILE_NAME);
              console.log("Worker determined settings file path:", settingsFilePath);

              if (fs.existsSync(settingsFilePath)) {
                  const settingsData = fs.readFileSync(settingsFilePath, 'utf-8');
                  const settings = JSON.parse(settingsData);
                  console.log("Worker loaded settings from file:", settings);

                  // Load the launch shortcut
                  if (settings.launchShortcut && settings.launchShortcut.key) {
                      // Transform the loaded shortcut to match the worker's expected format
                      TARGET_SHORTCUT = {
                          code: settings.launchShortcut.key, 
                          shift: settings.launchShortcut.shiftKey,
                          ctrl: settings.launchShortcut.ctrlKey, 
                          alt: settings.launchShortcut.altKey,
                          meta: settings.launchShortcut.metaKey
                      };
                      console.log("Loaded initial shortcut from file and transformed:", TARGET_SHORTCUT);
                  } else {
                      console.log("No valid launch shortcut found in settings file, using default.");
                  }
                  // Could load other settings like trigger key here if worker needed them

              } else {
                 console.log("Settings file not found, using default shortcut.");
              }
          } else {
              console.error("Could not get user data path in worker, using default shortcut.");
            }
        } catch (e) {
            console.error("Error loading settings from file:", e, "Using default shortcut.");
        }
        // --- Load initial settings from file --- END ---
        
        const result = startKeyboardListener();
        console.log("Keyboard listener startup result:", result);
        
        // Listen for shortcut updates from the panel
        csInterface.addEventListener("com.example.terminal.shortcutUpdate", function(event) {
          console.log("Received shortcut update event:", event.data);
          try {
            let newShortcut = null;
            if (typeof event.data === 'string') {
                newShortcut = JSON.parse(event.data);
            } else if (typeof event.data === 'object' && event.data !== null) {
                // If data is already an object (might happen sometimes), use it directly
                newShortcut = event.data;
                console.log("Event data was already an object.");
            }

            // Basic validation
            if (newShortcut && newShortcut.key) { 
              // Transform the panel's shortcut object to match the normalized event structure
              TARGET_SHORTCUT = {
                  code: newShortcut.key, // Use 'key' from panel for 'code'
                  shift: newShortcut.shiftKey,
                  ctrl: newShortcut.ctrlKey, 
                  alt: newShortcut.altKey,
                  meta: newShortcut.metaKey
              };
              console.log("Updated TARGET_SHORTCUT to:", TARGET_SHORTCUT);
            } else {
              console.warn("Received invalid shortcut data in event.");
            }
          } catch (e) {
            console.error("Error parsing shortcut update event data:", e);
          }
        });
      };
      
      // Clean up when the window closes
      window.onbeforeunload = stopKeyboardListener;
